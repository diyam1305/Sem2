<!DOCTYPE html>
<html>
<head>
	<title>Inline Style</title>
</head>
<body>
	<h1 style="background: black; color: blue; text-align: center;">This is a heading.</h1>

	<p style="color: red; font-family: verdana;">This is a paragraph.</p>

	<h1 style="background-color: rgb(255, 99, 71);">rgb(255, 99, 71)</h1>

	<h1 style="background-color: rgba(255, 99, 71, 0.5);">rgb(255, 99, 71, 0.5)</h1>
</body>
</html>
