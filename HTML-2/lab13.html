<!DOCTYPE html>
<html>
<head>
	<title></title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-primary">

	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
		<div class="container">
			<h4 class="text-center">
				Registration Form
			</h4>

		<div class="row">
			<div class="col-2">
				<label>First Name</label>
			</div>

			<div class="col-8">
				<div class="input-group" mb-3>
					<span class="input-group-text" id="basic-addon1">
						<link rel="#" href="#">
						<i class="bi-bi-person-circle"></i>
					</span>

					<input type="text" class="form-control" placeholder="First Name" arial-label="First Name" arial-describedby="basic-addon1">
				</div>
			</div>
		</div>

		<div class="container">
			<div class="row">
				<div class="col-2">
					<label>Last Name</label>
				</div>

				<div class="col-8">
					<div class="input-group mb-3">
						<span class="input-group-text">
							<link rel="#">
							<i class="bi-bi-person-circle"></i>
						</span>

						<input type="text" class="form-control" placeholder="Last Name" arial-label="Last Name">
					</div>
				</div>
			</div>
		</div>

		<div class="container">
			<div class="row">
				<div class="col-2">
					<label>Department Office</label>
				</div>

				<div class="col-8">
					<div class="input-group mb-3">
						<span class="input-group-text">
							<link rel="#">
							<i class="bi-bi-menu-up"></i>
						</span>

						<input type="text" class="form-control" placeholder="Select your department">
						<select>
							<option>CE</option>
							<option>IT</option>
						</select>
					</div>
				</div>
			</div>

			<div class="container">
				<div class="row">
					<div class="col-2">
						<label>Username</label>
					</div>

					<div class="col-8">
						<div class="input-group mb-3">
							<span class="input-group-text">
								<link rel="#">
							</span>

							<input type="text" class="form-control" placeholder="Username">
						</div>
					</div>
				</div>
			</div>

			<div class="container">
				<div class="row">
					<div class="col-2">
						<label>Password</label>
					</div>

					<div class="col-8">
						<div class="input-group mb-3">
							<span class="input-group-text">
								<link rel="#">
							</span>

							<input type="text" class="form-control" placeholder="Password">
						</div>
					</div>
				</div>
			</div>

			<div class="container">
				<div class="row">
					<div class="col-3">
						<label>E-Mail</label>
					</div>

					<div class="col-8">
						<div class="input-group mb-3">
							<span class="input-group-text" id="basic-addon1">
								<link rel="#">
							</span>

							<input type="text" class="form-control" placeholder="E-Mail" aria-label="Email">
						</div>
					</div>
				</div>
			</div>

			<div class="container">
				<div class="row">
					<div class="col-2">
						<label>Contact No</label>
					</div>

					<div class="col-8">
						<div class="input-group mb-3">
							<span class="input-group-text" id="basic-addon1">
								<link rel="#">
							</span>

							<input type="text" class="form-control" placeholder="639" arial-label="639">
						</div>
					</div>
				</div>
			</div>

			<div class="row">
				<div class="col-5"></div>

				<div class="col">
					<button type="button" class="btn-btn-warning text-center mx-auto">
						Submit
					</button>
				</div>
			</div>
		</div>
</body>
</html>
