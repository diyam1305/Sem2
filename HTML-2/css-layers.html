<!DOCTYPE html>
<html>
<head>
	<title>CSS Layers</title>
	<style>
		#division1
		{
			position: absolute;
			height: 100px;
			width: 100px;
			left: 100px;
			top: 150px;
			background-color: red;
			z-index: 5;
		}
		/*z-index property will work when we have ised position property of CSS lower value z-index element will go in background and higher level z-index will come in front*/
		#division2
		{
			position: absolute;
			height: 200px;
			width: 200px;
			left: 50px;
			top: 100px;
			background-color: blue;
			z-index: 20;
			opacity: 0.3;
		}
	</style>
</head>
<body>
	<div id="division1">red color</div>
	<div id="division2">lightblue color</div>
</body>
</html>
