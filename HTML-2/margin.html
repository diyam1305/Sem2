<!DOCTYPE html>
<html>
<head>
	<title>Margin Properties</title>
	<style>
		div
		{
			border: 1px solid black;
			margin-top: 100px;
			margin-bottom: 100px;
			margin-right: 150px;
			margin-left: 80px;
			background-color: lightblue;
		}
	</style>
</head>
<body>
	<h1>This is Margin Properties example</h1>
	<div>In this page, the border of 1px with solid and black, then margin of top is given 100px, margin of bottom is given 100px, margin of right is given 150px and margin of left is given 80px.</div>
</body>
</html>
