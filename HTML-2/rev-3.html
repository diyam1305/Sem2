<!DOCTYPE html>
<html>
    <head>
	   <title>rev 3</title>
    </head>
    <body>
    	<table>
    		<form>
    			<h1>Student Registration</h1>

    			<tr>
    				<td>Full Name</td>
    				<td><input type="text" name="text"></td>
    			</tr>

    			<tr>
    				<td>Email</td>
    				<td><input type="email" name="email"></td>
    			</tr>

    			<tr>
    				<td>Mobile No.</td>
    				<td><input type="number" name="number"></td>
    			</tr>

    			<tr>
    				<td>Address</td>
    				<td><textarea></textarea></td>
    			</tr>

    			<tr>
    				<td>Nationality</td>
    				<td><input type="text" name="text"></td>
    			</tr>

    			<tr>
    				<td>Date of Birth</td>
    				<td><input type="date" name="date"></td>
    			</tr>

    			<tr>
    				<td>Gender</td>
    				<td><input type="radio" name="Gender">Male
    				    <input type="radio" name="Gender">Female</td>
    			</tr>

    			<tr>
    				<td>Highest Degree</td>
    				<td><select><option>Select Degree</option>
    				            <option>10th</option>
    				            <option>12th</option>
    				            <option>UG</option>
    				            <option>PG</option>
    				            <option>Diploma</option>
    				    </select></td>
    			</tr>

    			<tr>
    				<td>CPI</td>
    				<td><input type="number" name="number"></td>
    			</tr>

    			<tr>
    				<td>University</td>
    				<td><input type="text" name="text"></td>
    			</tr>

    			<tr>
    				<td>Passing Year</td>
    				<td><select><option>Select your passing year</option>
    				            <option>2023</option>
    				            <option>2022</option>
    				            <option>2021</option>
    				            <option>2020</option>
    				            <option>2019</option>
    				    </select></td>
    			</tr>

    			<tr>
    				<td><input type="submit" name="submit">
    					<input type="button" value="cancel"></td>
    			</tr>

    		</form>
    	</table>
    </body>
</html>
