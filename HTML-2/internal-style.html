<!DOCTYPE html>
<html>
<head>
	<title>Internal Style</title>
	<style>
		/*Style for background*/
		body
		{
			background-color: lightblue;
		}
		/*Multiple Styles for h1 tag, p tag*/
		h1
		{
			color: red;
			text-align: center;
		}
		p, h2
		{
			font-family: verdana;
			font-size: 20px;
		}
	</style>
</head>
<body>
	<h1>Internal Style Example</h1>

	<p>This is a paragraph.</p>

	<h2>This is another example.</h2>
</body>
</html>
