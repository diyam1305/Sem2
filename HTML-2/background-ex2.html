<!DOCTYPE html>
<html>
<head>
	<title>Background Example2</title>
	<style>
		#myDIV
		{
			width: 400px;
			height: 400px;
			background-repeat: no-repeat, repeat;
			background-image: url("https://cdn.britannica.com/84/73184-050-05ED59CB/Sunflower-field-Fargo-North-Dakota.jpg"), url("https://m.media-amazon.com/images/I/6161TMIwL3L._AC_UF1000,1000_QL80_.jpg");
			background-blend-mode: strong lighten;
		}
	</style>
</head>
<body>
	<h1>Background Example2</h1>
	<div id="myDIV">The Background-Blend-Mode Property</div>
	<p>The blend mode property given to 1st image is strong and 2nd image lighten.</p>
</body>
</html>
